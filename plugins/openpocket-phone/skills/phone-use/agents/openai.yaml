interface:
  display_name: "Phone Use"
  short_description: "Control Android targets through OpenPocket"
  default_prompt: "Use OpenPocket to inspect my Android target."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "openpocket-phone"
      description: "OpenPocket Android target control tools"
      transport: "stdio"
