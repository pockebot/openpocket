name: Open pocket CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 11 * * 1' # Weekly on Monday at 11:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm' # Speeds up subsequent runs by caching dependencies
        
    - name: Enable KVM group perms
      run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm ci # 'ci' is faster and more reliable than 'install' in automated environments

    - name: Run tests
      timeout-minutes: 45
      run: npm run test

    - name: Run dual-side smoke gate
      timeout-minutes: 20
      run: npm run smoke:dual-side

  build-scheduled:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm' # Speeds up subsequent runs by caching dependencies
        
    - name: Enable KVM group perms
      run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm ci # 'ci' is faster and more reliable than 'install' in automated environments

    - name: Run tests
      timeout-minutes: 45
      run: npm run test
